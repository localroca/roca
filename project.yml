name: Roca
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    macOS: "15.0"
packages:
  Roca:
    path: .
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ARCHS: arm64
targets:
  RocaMac:
    type: application
    platform: macOS
    sources:
      - path: Apps/RocaMac
    dependencies:
      - package: Roca
        product: RocaCore
      - package: Roca
        product: RocaProviders
      - package: Roca
        product: RocaServices
      - package: Roca
        product: RocaStorage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.roca.mac
        PRODUCT_NAME: Roca
        INFOPLIST_FILE: Apps/RocaMac/Info.plist
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        ENABLE_HARDENED_RUNTIME: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"
