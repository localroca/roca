name: Bug report
description: Report reproducible behavior that is not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Roca. Please include enough detail for someone else to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest reliable reproduction path.
      placeholder: |
        1. Launch Roca
        2. Open Settings
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "Example: macOS 15.5"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Mac hardware
      placeholder: "Example: M3 Pro MacBook Pro"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Do not paste secrets, private prompts, transcripts, or selected text unless you intentionally want them public.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have removed secrets, private prompts, transcripts, and sensitive file paths from this report.
          required: true
